<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flag 驗證系統</title>
    <style>
        /* 全域樣式設定 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #2d2d44 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* 玻璃擬態卡片容器 */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px rgba(255, 255, 255, 0.1) solid;
            width: 350px;
            text-align: center;
        }

        h2 {
            margin-bottom: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* 輸入框樣式 */
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(108, 99, 255, 0.5);
        }

        /* 按鈕樣式 */
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #6c63ff;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a52e0;
            transform: translateY(-2px);
        }

        /* 結果顯示區域 */
        #result {
            margin-top: 1.5rem;
            font-weight: bold;
            min-height: 24px;
        }

        .correct { color: #4ade80; }
        .wrong { color: #f87171; }
    </style>
</head>
<body>

    <div class="container">
        <h2>解密任務</h2>
        <input type="text" id="flagInput" placeholder="請輸入 Flag..." autocomplete="off">
        <button onclick="checkFlag()">提交驗證</button>
        <div id="result"></div>
    </div>

    <script>
        function checkFlag() {
            const userInput = document.getElementById('flagInput').value;
            const resultDiv = document.getElementById('result');
            
            // 你的邏輯核心
            const secretFlag = "flag{v4l1d473_ur_1npu7}";

            if (userInput === secretFlag) {
                resultDiv.innerHTML = "✅ answer correct";
                resultDiv.className = "correct";
            } else {
                resultDiv.innerHTML = "❌ wrong";
                resultDiv.className = "wrong";
            }
        }

        // 支援按下 Enter 鍵觸發
        document.getElementById('flagInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkFlag();
            }
        });
    </script>

</body>
</html>
